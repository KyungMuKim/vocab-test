/* ================= 자동 채점 ================= */
const norm = s => (s||"").normalize("NFC").toLowerCase().replace(/\([^)]*\)/g,"").replace(/[\s~〜·.,;:!?'"()\[\]\-]/g,"");
const STRIP_END = /(하다|되다|시키다|스러운|스럽다|적인|롭다|된|한|의)$/;
function stem(t){ const x = t.replace(STRIP_END,""); return x.length>=2 ? x : t; }
function expandBrackets(str){
  const m = str.match(/^(.*?)([^\s\[]+)\[([^\]]+)\](.*)$/);
  if(!m) return [str];
  const [,pre,word,alt,post] = m;
  return [...expandBrackets(pre+word+post), ...expandBrackets(pre+alt+post)];
}
function meaningTokens(koArr){
  const t = new Set();
  koArr.forEach(m => m.split(/[,;\/·]/).forEach(piece => {
    expandBrackets(piece).forEach(x => {
      const n1 = norm(x), n2 = norm(x.replace(/[()]/g,""));
      [n1,n2].forEach(n => { if(n){ t.add(n); const st = stem(n); if(st!==n) t.add(st); } });
    });
  }));
  return t;
}
function matchToken(a, toks){ // "exact" | "fuzzy" | false
  if(toks.has(a)) return "exact";
  const sa = stem(a);
  if(sa!==a && toks.has(sa)) return "fuzzy";
  for(const t of toks){
    if(t.length<2 || a.length<2) continue;
    if(sa===stem(t)) return "fuzzy";
    if(t.includes(a) && a.length/t.length>=0.5) return "fuzzy";
    if(a.includes(t) && t.length/a.length>=0.6) return "fuzzy";
  }
  return false;
}
/* 반환: {correct, review} — review=true면 사람/AI 감수 대상 */
function autoGrade(ko, ans){
  const parts = (ans||"").split(/[,;\/·]/).map(norm).filter(Boolean);
  if(!parts.length) return { correct:false, review:false };
  const toks = meaningTokens(ko);
  let fuzzy = false;
  for(const a of parts){
    const m = matchToken(a, toks);
    if(m==="exact") return { correct:true, review:false };
    if(m==="fuzzy") fuzzy = true;
  }
  if(fuzzy) return { correct:true, review:true };
  return { correct:false, review: parts.join("").length>=2 };
}

/* ================= 유틸 ================= */
const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; };
const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

/* 진단고사 여부: new_units가 비어있으면 진단고사 */
const isDiag = a => ((a && (a.new_units||a.newUnits)) || []).length === 0 && (a.round===0 || a.round===undefined);
const roundLabel = a => isDiag(a) ? "진단고사" : (a.round+1)+"회차";

/* ===== 진행 중 시험 임시저장 (새로고침·실수 대비) ===== */

/* 학생의 전체 이력 로드 → 오답 풀/커버 단원 계산 */
async function loadHistory(studentId){
  const { data: attempts, error: e1 } = await sb.from("attempts").select("*").eq("student_id", studentId).order("round");
  if(e1) err(e1);
  let items = [];
  if(attempts.length){
    const { data, error: e2 } = await sb.from("attempt_items").select("*").in("attempt_id", attempts.map(a=>a.id)).order("seq");
    if(e2) err(e2);
    items = data;
  }
  const roundOf = Object.fromEntries(attempts.map(a=>[a.id, a.round]));
  items.sort((x,y)=> (roundOf[x.attempt_id]-roundOf[y.attempt_id]) || (x.seq-y.seq));
  /* 단어별 SR 상태: 연속 정답 횟수(streak), 마지막 출제 회차(lastRound), 누적 오답(miss) */
  const state = {};
  items.forEach(it => {
    const st = state[it.en] || (state[it.en] = { en: it.en, word_id: it.word_id, unit: it.unit, streak: 0, lastRound: 0, miss: 0 });
    if(it.word_id) st.word_id = it.word_id;
    st.lastRound = roundOf[it.attempt_id];
    if(it.correct) st.streak++;
    else { st.streak = 0; st.miss++; }
  });
  const srPool = Object.values(state).filter(w=>w.word_id);
  const wrongPool = srPool.filter(w=>w.streak===0).sort((a,b)=>b.miss-a.miss);
  const covered = [...new Set(attempts.flatMap(a=>a.new_units||[]))].sort((a,b)=>a-b);
  const seenIds = [...new Set(items.map(it=>it.word_id).filter(Boolean))];
  return { attempts, items, srPool, wrongPool, covered, seenIds };
}

/* 다음 시험 구성 */
async function buildTest(student, hist){
  const round = hist.attempts.length;

  /* ===== round 0 = 진단고사: 능률보카 전범위에서 랜덤 DIAG_COUNT문항 ===== */
  if(round === 0){
    const { data: allWords, error } = await sb.from("words").select("id,en,ko,unit").lte("unit", 60);
    if(error) err(error);
    const items = shuffle(allWords).slice(0, CONFIG.DIAG_COUNT)
      .map(w => ({ word_id:w.id, en:w.en, ko:w.ko, unit:w.unit, type:"new" }));
    return { round, newUnits: [], items, review: [], diag: true };
  }

  /* ===== 이후 회차: 신규 단원 + 복습 ===== */
  const nCount = CONFIG.NEW_UNITS[student.class_day] || 1;
  const remaining = [];
  for(let u=1; u<=CONFIG.MAX_UNIT; u++) if(!hist.covered.includes(u)) remaining.push(u);
  const newUnits = remaining.slice(0, nCount);

  let items = [];
  if(newUnits.length){
    const { data: newWords, error } = await sb.from("words").select("id,en,ko,unit").in("unit", newUnits);
    if(error) err(error);
    items = shuffle(newWords).map(w => ({ word_id:w.id, en:w.en, ko:w.ko, unit:w.unit, type:"new" }));
  }

  /* ===== 복습 구성 =====
     1회차(진단 직후): 진단 오답 전부(최대 DIAG_WRONG_CAP) — 랜덤/주기 없음
     2회차 이후: 오답(streak 0, 다음 시험 즉시) + SR 주기 도래 단어 + 부족분 랜덤 */
  let review = [];
  const newIdSet = new Set(items.map(w=>w.word_id));
  const isPostDiag = round === 1;
  const iv = s => CONFIG.SR_INTERVALS[Math.min(s, CONFIG.SR_INTERVALS.length-1)];
  const due = hist.srPool.filter(w => !newIdSet.has(w.word_id) && (round - w.lastRound) >= iv(w.streak));

  const wrongs = due.filter(w=>w.streak===0).sort((a,b)=>b.miss-a.miss)
    .slice(0, isPostDiag ? CONFIG.DIAG_WRONG_CAP : CONFIG.WRONG_CAP);
  const srs = isPostDiag ? [] :
    due.filter(w=>w.streak>0)
       .sort((a,b)=> (round-b.lastRound-iv(b.streak)) - (round-a.lastRound-iv(a.streak)) || a.streak-b.streak) // 연체 큰 것, 낮은 box 우선
       .slice(0, CONFIG.SR_COUNT);
  const pickedIds = new Set([...wrongs, ...srs].map(w=>w.word_id));

  /* 주기 슬롯이 남으면 학습한 단어 중 랜덤으로 채움 */
  let randIds = [];
  if(!isPostDiag && srs.length < CONFIG.SR_COUNT){
    const cand = hist.seenIds.filter(id => !pickedIds.has(id) && !newIdSet.has(id));
    randIds = shuffle(cand).slice(0, CONFIG.SR_COUNT - srs.length);
  }

  const fetchIds = [...pickedIds, ...randIds];
  if(fetchIds.length){
    const { data: ww, error: ew } = await sb.from("words").select("id,en,ko,unit").in("id", fetchIds);
    if(ew) err(ew);
    const byId = Object.fromEntries((ww||[]).map(w=>[w.id,w]));
    const mk = (id, type) => { const wd = byId[id]; return wd ? { word_id:wd.id, en:wd.en, ko:wd.ko, unit:wd.unit, type } : null; };
    review = shuffle([
      ...wrongs.map(w=>mk(w.word_id,"wrong")),
      ...srs.map(w=>mk(w.word_id,"sr")),
      ...randIds.map(id=>mk(id,"random"))
    ].filter(Boolean));
  }

  if(!items.length && !review.length) return null;
  return { round, newUnits, items, review };
}

/* ================= 반 통계 (신규/복습 각각) ================= */
function statBlock(cohort, myId, f){
  const vals = cohort.map(f);
  const n = vals.length, sum = vals.reduce((a,b)=>a+b,0);
  const avg = sum/n, max = Math.max(...vals), min = Math.min(...vals);
  const me = cohort.find(c=>c.id===myId);
  const my = me ? f(me) : null;
  const rank = my===null ? null : cohort.filter(c=>f(c)>my).length + 1;
  return { n, avg, max, min, my, rank };
}
/* att: attempt 레코드, day: 학생 반(요일). 같은 회차·같은 반 계정만 비교. */
async function roundStats(att, day){
  const { data: peers, error } = await sb.from("attempts")
    .select("id,round,new_score,new_total,rev_score,rev_total,students(name,class_day,active)")
    .eq("round", att.round);
  if(error || !peers) return null;
  const ex = CONFIG.EXCLUDE_NAMES;
  const cohort = peers.filter(p => p.students && p.students.class_day===day && p.students.active!==false
    && !ex.some(nm => (p.students.name||"").includes(nm)));
  if(!cohort.length) return null;
  const out = { n: cohort.length };
  out.new = statBlock(cohort, att.id, p=>p.new_score);           // 신규: 정답 개수 기준
  const revCohort = cohort.filter(p=>p.rev_total>0);
  if(att.rev_total>0 && revCohort.length){
    out.rev = statBlock(revCohort, att.id, p=> p.rev_score/(p.rev_total||1)); // 복습: 정답률 기준
  }
  return out;
}

/* PIN 검증 후 진행 (비밀번호는 서버에서만 대조 — 화면/코드에 노출 안 됨) */
window.pinGo = async function(student, resume){
  const inp = document.getElementById("pinInput");
  const pin = (inp && inp.value || "").trim();
  if(!/^\d{4}$/.test(pin)){ alert("비밀번호 4자리(숫자)를 입력하세요"); if(inp) inp.focus(); return; }
  const btns = document.querySelectorAll("button");
  btns.forEach(b=>b.disabled=true);
  const { data: ok, error } = await sb.rpc("student_pin_verify", { p_student_id: student.id, p_pin: pin });
  if(error){ btns.forEach(b=>b.disabled=false); return alert("오류: "+error.message); }
  if(!ok){
    btns.forEach(b=>b.disabled=false);
    if(inp){ inp.value=""; inp.focus(); }
    return alert("비밀번호가 달라요. 본인 이름이 맞는지, 비밀번호를 다시 확인하세요.");
  }
  proceedStudent(student, resume);
};

/* 2단계: 시험 준비 or 이어하기 */
window.proceedStudent = async function(student, resume){
  app.innerHTML = `<div class="card"><h2>${esc(student.name)}</h2><div class="sub">시험 준비 중...</div></div>`;
  const hist = await loadHistory(student.id);

  if(resume){
    const d = loadDraft(student.id);
    if(d && d.queue && d.queue.length){
      S = { student, hist,
        test:{ round:d.round, newUnits:d.newUnits, diag:d.diag,
                items:d.queue.filter(q=>q.type==="new"), review:d.queue.filter(q=>q.type!=="new") },
        queue:d.queue, answers:d.answers||new Array(d.queue.length).fill(""), idx:d.idx||0 };
      question();
      return;
    }
  }

  const test = await buildTest(student, hist);
  S = { student, hist, test };
  let body;
  if(!test){
    body = `<div class="pill">모든 단원을 마쳤어요 🎉</div>`;
  } else {
    const last = hist.attempts[hist.attempts.length-1];
    const recentNote = last ? `최근 응시: ${roundLabel(last)} · ${fmtDate(last.taken_at)}` : "최근 응시: 없음 (첫 시험)";
    const recentWarn = last && (Date.now()-new Date(last.taken_at) < CONFIG.RECENT_WARN_MIN*60000)
      ? `<div class="flag amber">⚠️ 방금 전(${fmtDate(last.taken_at)})에 이미 응시한 기록이 있어요. 본인·회차가 맞는지 다시 확인하세요.</div>` : "";
    let head;
    if(test.diag){
      head = `📘 <b>진단고사</b> (${student.class_day}요일반) — 능률보카 전범위 랜덤 <b>${test.items.length}문항</b><br><span class="small">첫 시험은 실력 측정용이라 복습 없이 진행돼요. 여기서 틀린 단어는 다음 복습에 나와요.</span>`;
    } else {
      const cnt = t => test.review.filter(r=>r.type===t).length;
      const revParts = [["오답",cnt("wrong")],["주기",cnt("sr")],["랜덤",cnt("random")]].filter(p=>p[1]).map(p=>`${p[0]} ${p[1]}`).join(" + ");
      head = `📘 <b>${test.round+1}회차</b> (${student.class_day}요일반) — 신규: ${test.newUnits.map(u=>u+"단원").join(", ")} (${test.items.length}문항)`
           + (test.review.length ? `<br>🔁 복습: ${test.review.length}문항 (${revParts})${test.round===1?'<br><span class="small">진단고사에서 틀린 단어가 모두 나와요.</span>':''}` : "<br>이번 회차는 복습 문항이 없어요");
    }
    body = `<div class="small" style="margin-bottom:6px">${recentNote}</div>${recentWarn}
      <div class="pill">${head}</div>
      <button class="btn-primary" onclick="startTest()">시험 시작</button>`;
  }
  app.innerHTML = `<div class="card"><h2>${esc(student.name)}</h2>${body}
    <div class="row"><button class="btn-ghost btn-sm" onclick="home()">← 이름 다시 선택</button></div></div>`;
};

window.startTest = function(){
  S.queue = [...S.test.items, ...S.test.review];
  S.answers = new Array(S.queue.length).fill("");
  S.idx = 0;
  saveDraft();
  question();
};
function question(){
  const i = S.idx, q = S.queue[i], total = S.queue.length;
  const badge = q.type==="new" ? (S.test.diag?'<span class="badge b-diag">진단</span>':'<span class="badge b-new">신규</span>')
    : q.type==="wrong" ? '<span class="badge b-wrong">복습·오답</span>'
    : q.type==="sr" ? '<span class="badge b-random">복습·주기</span>' : '<span class="badge b-random">복습·랜덤</span>';
  app.innerHTML = `
   <div class="card">
     <div class="small">${esc(S.student.name)} · ${roundLabel(S.test)} · ${i+1} / ${total}</div>
     <div class="progress"><div style="width:${(i/total*100).toFixed(1)}%"></div></div>
     <div class="word">${esc(q.en)}${badge}</div>
     <input type="text" id="ans" placeholder="한글 뜻 입력" autocomplete="off" value="${esc(S.answers[i])}">
     <div class="row">
       ${i>0?'<button class="btn-ghost" onclick="nav(-1)">← 이전</button>':""}
       <button class="btn-primary" onclick="nav(1)">${i===total-1?"제출하기":"다음 →"}</button>
     </div>
   </div>`;
  const inp = document.getElementById("ans");
  inp.focus();
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.isComposing && e.keyCode!==229) nav(1); });
}
window.nav = function(d){
  S.answers[S.idx] = document.getElementById("ans").value;
  saveDraft();
  const nx = S.idx + d;
  if(nx >= S.queue.length){
    S.graded = S.queue.map((q,i)=>{ const g = autoGrade(q.ko, S.answers[i]); return { ...q, answer:S.answers[i], correct:g.correct, review:g.review }; });
    reviewScreen();
    return;
  }
  S.idx = Math.max(0,nx);
  saveDraft();
  question();
};
function reviewScreen(){
  const rows = S.graded.map((g,i)=>`
    <tr>
      <td><b>${esc(g.en)}</b><br><span class="small">${esc(g.ko.join(", "))}</span></td>
      <td>${esc(g.answer)||'<span class="small">(무응답)</span>'}</td>
      <td class="${g.correct?"ok":"no"}">${g.correct?"O":"X"}${g.review?' <span title="감수 대상">⚠️</span>':''}</td>
      <td><button class="btn-ghost btn-sm" onclick="flip(${i})">수정</button></td>
    </tr>`).join("");
  const c = S.graded.filter(g=>g.correct).length;
  app.innerHTML = `
   <div class="card">
     <h2>채점 확인 ✍️</h2>
     <div class="sub">자동 채점 결과예요. 유사 답은 '수정'으로 뒤집을 수 있어요. (저장 후에도 선생님이 수정 가능)</div>
     <div class="score-big">${c} / ${S.graded.length}</div>
     <table><tr><th>단어 / 정답</th><th>내 답</th><th>채점</th><th></th></tr>${rows}</table>
     <button class="btn-primary" style="margin-top:14px" onclick="submitResult()">결과 저장</button>
   </div>`;
}
window.flip = function(i){ S.graded[i].correct = !S.graded[i].correct; S.graded[i].review = false; reviewScreen(); };

window.submitResult = async function(){
  if(S.submitting) return;
  S.submitting = true;
  app.innerHTML = `<div class="card"><h2>저장 중...</h2></div>`;
  try{
    const nw = S.graded.filter(g=>g.type==="new"), rv = S.graded.filter(g=>g.type!=="new");
    const scores = {
      new_score: nw.filter(g=>g.correct).length, new_total: nw.length,
      rev_score: rv.filter(g=>g.correct).length, rev_total: rv.length
    };
    /* 멱등성: 이미 만든 attempt가 있으면 재사용(중복 저장 방지) */
    if(!S.attemptId){
      const { data: ex } = await sb.from("attempts").select("id,taken_at")
        .eq("student_id", S.student.id).eq("round", S.test.round)
        .order("taken_at",{ascending:false}).limit(1);
      if(ex && ex.length && (Date.now()-new Date(ex[0].taken_at) < 10*60*1000)){
        S.attemptId = ex[0].id;
        await sb.from("attempts").update(scores).eq("id", S.attemptId);
        const { data: exItems } = await sb.from("attempt_items").select("id").eq("attempt_id", S.attemptId).limit(1);
        S.itemsSaved = !!(exItems && exItems.length);
      } else {
        const { data: att, error: e1 } = await sb.from("attempts").insert({
          student_id: S.student.id, round: S.test.round, new_units: S.test.newUnits, ...scores
        }).select().single();
        if(e1) throw e1;
        S.attemptId = att.id;
      }
    } else {
      await sb.from("attempts").update(scores).eq("id", S.attemptId);
    }
    if(!S.itemsSaved){
      const { error: e2 } = await sb.from("attempt_items").insert(S.graded.map((g,i)=>({
        attempt_id: S.attemptId, word_id: g.word_id, en: g.en, unit: g.unit,
        item_type: g.type==="sr" ? "random" : g.type, /* DB check 제약(new/wrong/random) 호환 — SR 상태는 correct 이력으로 재계산됨 */
        answer: g.answer, correct: g.correct, needs_review: g.review, seq: i
      })));
      if(e2) throw e2;
      S.itemsSaved = true;
    }
    clearDraft(S.student.id);
    S.submitting = false;
    const nc = S.graded.filter(g=>g.type==="new").filter(g=>g.correct).length;
    const nt = S.graded.filter(g=>g.type==="new").length;
    const rc = S.graded.filter(g=>g.type!=="new").filter(g=>g.correct).length;
    const rt = S.graded.filter(g=>g.type!=="new").length;
    app.innerHTML = `
     <div class="card">
       <h2>저장 완료 ✅</h2>
       <div class="score-big">${nc} / ${nt} <span class="small">${newLabel(S.test)}</span>
         ${rt? `&nbsp; ${rc} / ${rt} <span class="small">복습</span>`:""}</div>
       <div class="pill">틀린 단어는 다음 복습 시험에 다시 나와요 💪</div>
       <button class="btn-primary" onclick="home()">처음으로</button>
     </div>`;
  }catch(e){
    S.submitting = false;
    app.innerHTML = `
     <div class="card">
       <h2>저장 실패 ⚠️</h2>
       <div class="pill">네트워크 문제로 저장하지 못했어요. <b>답안은 그대로 남아있으니</b> 아래 버튼으로 다시 시도하세요.</div>
       <div class="small" style="margin:8px 0">${esc(e.message||String(e))}</div>
       <button class="btn-primary" onclick="submitResult()">다시 저장</button>
       <div class="row"><button class="btn-ghost btn-sm" onclick="reviewScreen()">← 채점 화면으로</button></div>
     </div>`;
  }
};

window.dashDetail = async function(attemptId, extraPanel){

    <div class="row">
      <button class="btn-ghost btn-sm" onclick="dashLive()">← 목록</button>
      <button class="btn-primary btn-sm" style="width:auto" onclick="makeReport('${attemptId}')">📷 결과지 저장</button>
      <button class="btn-ghost btn-sm" onclick="reassignStart('${attemptId}')">↔ 학생 이동</button>

};
/* 통계 HTML (선생님 화면용) */
function statsHTML(stats, att){
  if(!stats) return "";
  const s = stats.new;
  let html = `<div class="statbox">📊 <b>반 통계</b> · ${roundLabel(att)} · ${stats.n}명 응시<br>`
    + `<b>${newLabel(att)}</b> — 내 점수 <b>${s.my}</b> · 평균 ${s.avg.toFixed(1)} · 최고 ${s.max} · 최저 ${s.min} · 등수 <b>${s.rank}/${s.n}</b>`;
  if(stats.rev){
    const r = stats.rev;
    html += `<br><b>복습</b> — 내 정답률 <b>${Math.round(r.my*100)}%</b> · 평균 ${Math.round(r.avg*100)}% · 최고 ${Math.round(r.max*100)}% · 최저 ${Math.round(r.min*100)}% · 등수 <b>${r.rank}/${r.n}</b>`;
  }
  html += `</div>`;
  return html;
}
window.teacherFlip = async function(itemId, attemptId){
  const { data: it, error: e0 } = await sb.from("attempt_items").select("*").eq("id", itemId).single();
  if(e0) err(e0);
  const { error: e1 } = await sb.from("attempt_items").update({ correct: !it.correct, corrected: true, needs_review: false }).eq("id", itemId);
  if(e1) err(e1);
  const { data: items, error: e2 } = await sb.from("attempt_items").select("*").eq("attempt_id", attemptId);
  if(e2) err(e2);
  const nw = items.filter(x=>x.item_type==="new"), rv = items.filter(x=>x.item_type!=="new");
  const { error: e3 } = await sb.from("attempts").update({
    new_score: nw.filter(x=>x.correct).length, new_total: nw.length,
    rev_score: rv.filter(x=>x.correct).length, rev_total: rv.length
  }).eq("id", attemptId);
  if(e3) err(e3);
  dashDetail(attemptId);
};

/* ===== 결과지 이미지 생성 (문자/카톡 전송용) ===== */
window.makeReport = async function(attemptId){
  const { data: att, error: e1 } = await sb.from("attempts").select("*, students(name,class_day)").eq("id", attemptId).single();
  if(e1) err(e1);
  const { data: items, error: e2 } = await sb.from("attempt_items").select("*").eq("attempt_id", attemptId).order("seq");
  if(e2) err(e2);
  const stats = await roundStats(att, att.students?.class_day);
  const wrongs = items.filter(it=>!it.correct);
  let koMap = {};
  if(wrongs.length){
    const ids = wrongs.map(w=>w.word_id).filter(Boolean);
    const { data: ws } = await sb.from("words").select("id,ko").in("id", ids);
    (ws||[]).forEach(w=>{ koMap[w.id] = w.ko; });
  }
  const W = 800, pad = 40, lineH = 46;
  const statLines = stats ? (stats.rev ? 3 : 2) : 0;
  const statH = stats ? (34 + statLines*30 + 16) : 0;
  const H = 300 + statH + 70 + Math.max(wrongs.length,1)*lineH + 110;
  const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const dateStr = new Date(att.taken_at).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"});
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,W,H);
  // 헤더
  ctx.fillStyle = "#4f6ef7"; ctx.fillRect(0,0,W,110);
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 34px 'Malgun Gothic', sans-serif";
  ctx.fillText("📘 단어시험 결과", pad, 52);
  ctx.font = "20px 'Malgun Gothic', sans-serif";
  ctx.fillText(`${att.students?.name} · ${roundLabel(att)}${isDiag(att)?" (전범위 랜덤)":" ("+(att.new_units||[]).join(", ")+"단원)"} · ${dateStr}`, pad, 88);
  // 점수
  let y = 158;
  ctx.fillStyle = "#1c2333";
  ctx.font = "bold 26px 'Malgun Gothic', sans-serif";
  let scoreLine = `${isDiag(att)?"진단":"신규"} ${att.new_score} / ${att.new_total}`;
  if(att.rev_total) scoreLine += `      복습 ${att.rev_score} / ${att.rev_total}`;
  ctx.fillText(scoreLine, pad, y);
  y += 30;
  // 반 통계 박스
  if(stats){
    ctx.strokeStyle = "#e5e9f2"; ctx.lineWidth = 1;
    ctx.fillStyle = "#f7f9ff";
    const boxTop = y+4, boxH = statH;
    ctx.fillRect(pad, boxTop, W-pad*2, boxH);
    ctx.strokeRect(pad, boxTop, W-pad*2, boxH);
    let sy = boxTop + 30;
    ctx.fillStyle = "#4f6ef7";
    ctx.font = "bold 19px 'Malgun Gothic', sans-serif";
    ctx.fillText(`📊 반 통계  ·  ${stats.n}명 응시`, pad+18, sy);
    sy += 30;
    const s = stats.new;
    ctx.fillStyle = "#1c2333";
    ctx.font = "18px 'Malgun Gothic', sans-serif";
    ctx.fillText(`${isDiag(att)?"진단":"신규"}  내 ${s.my}점  ·  평균 ${s.avg.toFixed(1)}  ·  최고 ${s.max}  ·  최저 ${s.min}  ·  등수 ${s.rank}/${s.n}`, pad+18, sy);
    if(stats.rev){
      sy += 30;
      const r = stats.rev;
      ctx.fillText(`복습  내 ${Math.round(r.my*100)}%  ·  평균 ${Math.round(r.avg*100)}%  ·  최고 ${Math.round(r.max*100)}%  ·  최저 ${Math.round(r.min*100)}%  ·  등수 ${r.rank}/${r.n}`, pad+18, sy);
    }
    y = boxTop + boxH + 30;
  }
  // 구분선
  ctx.strokeStyle = "#e5e9f2"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W-pad, y); ctx.stroke();
  y += 40;
  // 복습 대상
  ctx.fillStyle = "#dc2626";
  ctx.font = "bold 24px 'Malgun Gothic', sans-serif";
  ctx.fillText(`🔻 중점 복습 단어 (${wrongs.length}개)`, pad, y);
  y += 42;
  ctx.font = "20px 'Malgun Gothic', sans-serif";
  if(!wrongs.length){
    ctx.fillStyle = "#16a34a";
    ctx.fillText("모든 문제를 맞혔어요! 🎉", pad, y);
    y += lineH;
  } else {
    wrongs.forEach(wr=>{
      ctx.fillStyle = "#1c2333";
      ctx.font = "bold 21px 'Malgun Gothic', sans-serif";
      ctx.fillText(wr.en, pad, y);
      ctx.font = "19px 'Malgun Gothic', sans-serif";
      ctx.fillStyle = "#68718a";
      let ko = (koMap[wr.word_id]||[]).join(", ");
      if(ko.length > 38) ko = ko.slice(0,37) + "…";
      ctx.fillText(ko, pad + 200, y);
      y += lineH;
    });
  }
  // 푸터
  ctx.strokeStyle = "#e5e9f2";
  ctx.beginPath(); ctx.moveTo(pad, y+8); ctx.lineTo(W-pad, y+8); ctx.stroke();
  ctx.fillStyle = "#68718a";
  ctx.font = "18px 'Malgun Gothic', sans-serif";
  ctx.fillText("위 단어들은 다음 복습 시험에 다시 출제됩니다. 꼭 복습해 주세요! 💪", pad, y+48);
  // 저장/공유
  cv.toBlob(async blob=>{
    const fname = `결과지_${att.students?.name}_${new Date(att.taken_at).toISOString().slice(0,10)}.png`;
    const file = new File([blob], fname, { type: "image/png" });
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      try { await navigator.share({ files:[file], title:"단어시험 결과지" }); return; } catch(e){ /* 취소 시 다운로드로 */ }
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = fname; a.click();
    URL.revokeObjectURL(a.href);
  }, "image/png");
};

window.dashStudents = async function(){
  T.tab="students"; T.detail=null;
  const { data, error } = await sb.from("students").select("*").order("name");
  if(error) err(error);
  const pins = {};
  const { data: pinRows, error: pinErr } = await sb.rpc("teacher_pin_list", { p_teacher_pin: T.pin });
  if(!pinErr) (pinRows||[]).forEach(r=>{ pins[r.student_id]=r.pin; });
  const rows = data.map(s=>`
    <tr>
      <td><b>${esc(s.name)}</b></td><td>${s.class_day}요일반</td>
      <td><b>${pins[s.id]||"—"}</b> <button class="btn-ghost btn-sm" onclick="changePin('${s.id}','${esc(s.name)}')">변경</button></td>
      <td>${s.active?"활동":"<span class='small'>숨김</span>"}</td>
      <td><button class="btn-ghost btn-sm" onclick="toggleStudent('${s.id}',${!s.active})">${s.active?"숨기기":"복구"}</button></td>
    </tr>`).join("");
  dashShell(`<h2>학생 관리</h2>
    ${pinErr?`<div class="flag amber">PIN 불러오기 실패: ${esc(pinErr.message)} — supabase_4_학생PIN_공용.sql 을 실행했는지 확인하세요.</div>`:""}
    <div class="row">
      <input type="text" id="newName" placeholder="이름" style="flex:2; margin:0">
      <select id="newDay"><option value="화">화요일반</option><option value="목">목요일반</option></select>
      <button class="btn-ghost" onclick="addStudent()">추가</button>
    </div>
    <table><tr><th>이름</th><th>반</th><th>비밀번호</th><th>상태</th><th></th></tr>${rows}</table>`);
};
window.addStudent = async function(){
  const name = document.getElementById("newName").value.trim();
  const day = document.getElementById("newDay").value;
  if(!name) return alert("이름을 입력하세요");
  const { error } = await sb.from("students").insert({ name, class_day: day });
  if(error) return alert(error.code==="23505" ? "이미 있는 이름이에요" : "오류: "+error.message);
  dashStudents();
};
window.changePin = async function(id, name){
  const pin = prompt(`${name} 학생의 새 비밀번호 (숫자 4자리)`);
  if(pin===null) return;
  if(!/^\d{4}$/.test(pin.trim())) return alert("숫자 4자리로 입력하세요");
  const { error } = await sb.rpc("teacher_pin_set", { p_teacher_pin: T.pin, p_student_id: id, p_pin: pin.trim() });
  if(error) return alert("오류: "+error.message);
  dashStudents();
};
window.toggleStudent = async function(id, active){
  const { error } = await sb.from("students").update({ active }).eq("id", id);
  if(error) err(error);
  dashStudents();
};
window.dashHistory = async function(){
  T.tab="history"; T.detail=null;
  const { data: students, error } = await sb.from("students").select("*").order("name");
  if(error) err(error);
  dashShell(`<h2>학생별 내역</h2>
    ${students.map(s=>`<button class="student-btn" onclick='dashStudentHistory(${JSON.stringify(s)})'>${esc(s.name)}</button>`).join("") || '<div class="pill">학생이 없어요</div>'}`);
};
window.dashStudentHistory = async function(student){
  T.tab="history";
  const hist = await loadHistory(student.id);
  const rows = hist.attempts.map(a=>`
    <tr class="att-row" onclick="dashDetail('${a.id}')">
      <td>${roundLabel(a)}<br><span class="small">${fmtDate(a.taken_at)}</span></td>
      <td>${isDiag(a)?"전범위":(a.new_units||[]).join(",")+"단원"}</td>
      <td>${newLabel(a)} <b>${a.new_score}/${a.new_total}</b>${a.rev_total?`<br>복습 <b>${a.rev_score}/${a.rev_total}</b>`:""}</td>
      <td>›</td>
    </tr>`).join("");
  dashShell(`<h2>${esc(student.name)}</h2>
    <div class="flag">진도: ${hist.covered.length ? hist.covered.join(", ")+"단원 완료" : "아직 없음"} · 누적 오답 풀 ${hist.wrongPool.length}개</div>
    ${hist.wrongPool.length?`<div class="pill">🔻 오답 풀: ${hist.wrongPool.map(w=>`${esc(w.en)}(${w.miss})`).join(", ")}</div>`:""}
    <table><tr><th>회차</th><th>범위</th><th>점수</th><th></th></tr>${rows || "<tr><td>응시 기록 없음</td></tr>"}</table>`);
};

home();
</script>
